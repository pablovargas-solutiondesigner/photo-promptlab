<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Switch to resources/ folder</title>
<style>
  body { font-family:system-ui; background:#060816; color:#fafafa; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:14px; padding:24px; }
  h1  { font-size:16px; color:#3ecf8e; margin:0; }
  p   { font-size:13px; color:#6b7a9e; margin:0; text-align:center; max-width:420px; line-height:1.6; }
  .btn { padding:12px 28px; border-radius:9999px; border:none; background:linear-gradient(135deg,#7C4DFF,#3ecf8e); color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  .log { font-family:monospace; font-size:12px; color:#6b7a9e; text-align:left; max-width:480px; width:100%; }
  .ok  { color:#3ecf8e; } .err { color:#ff6b6b; }
</style>
</head>
<body>
<h1>📁 Switch cameras → resources/ folder</h1>
<p>Asegúrate de haber copiado las 5 imágenes a <code>resources/</code> antes de continuar.<br>Este script reemplaza el base64 en index.html con rutas relativas simples.</p>
<button class="btn" id="btn" onclick="run()">Seleccionar index.html y aplicar</button>
<div class="log" id="log"></div>

<script>
// Camera ID → filename in resources/
const MAP = {
  canon5d4:        'resources/Canon.png',
  fujifilmgfx100s: 'resources/Fujifilm.png',
  sonya7r5:        'resources/Sony.png',
  nikonz9:         'resources/Nikon.png',
  leicam11:        'resources/Leica.png'
};

// Old template line (with data: check logic added by fix-camera-template)
const OLD_TEMPLATE = `\${CAMERA_SVG[c.id] ? (CAMERA_SVG[c.id].startsWith('data:') ? \`<img src="\${CAMERA_SVG[c.id]}" style="width:100%;height:100%;object-fit:cover;display:block;" alt="\${c.title}">\` : CAMERA_SVG[c.id]) : ''}`;
// Fallback: original template before fix was applied
const OLD_TEMPLATE_ORIG = `\${CAMERA_SVG[c.id] || ''}`;
// New unified template — works for both paths and data URIs
const NEW_TEMPLATE = `\${CAMERA_SVG[c.id] ? \`<img src="\${CAMERA_SVG[c.id]}" style="width:100%;height:100%;object-fit:cover;display:block;" alt="\${c.title}">\` : ''}`;

function log(msg, cls='') {
  const div = document.getElementById('log');
  div.innerHTML += `<div class="${cls}">${msg}</div>`;
}

async function run() {
  document.getElementById('btn').disabled = true;
  try {
    const [handle] = await window.showOpenFilePicker({
      types:[{description:'HTML',accept:{'text/html':['.html']}}]
    });
    const file = await handle.getFile();
    log(`Leyendo ${file.name} (${Math.round(file.size/1024/1024*10)/10} MB)…`);
    let html = await file.text();

    // Replace each CAMERA_SVG assignment — single quotes, base64 can't contain them
    let swapped = 0;
    for (const [id, path] of Object.entries(MAP)) {
      const eid = id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      // Match: CAMERA_SVG['id'] = '...anything...';
      const re = new RegExp(`CAMERA_SVG\\['${eid}'\\]\\s*=\\s*'[^']*';`);
      const replacement = `CAMERA_SVG['${id}'] = '${path}';`;
      const next = html.replace(re, replacement);
      if (next !== html) { swapped++; log(`✓ ${id} → ${path}`, 'ok'); }
      else { log(`⚠ ${id}: no se encontró la asignación`, 'err'); }
      html = next;
    }

    // Fix template
    if (html.includes(OLD_TEMPLATE)) {
      html = html.replace(OLD_TEMPLATE, NEW_TEMPLATE);
      log('✓ Template actualizado (img src unificado)', 'ok');
    } else if (html.includes(OLD_TEMPLATE_ORIG)) {
      html = html.replace(OLD_TEMPLATE_ORIG, NEW_TEMPLATE);
      log('✓ Template original reemplazado', 'ok');
    } else {
      log('⚠ Template no encontrado — puede que ya esté actualizado', 'err');
    }

    log(`Total reemplazados: ${swapped}/5`);
    log('Guardando…');
    const writable = await handle.createWritable();
    await writable.write(html);
    await writable.close();
    log('✅ index.html guardado. ¡Verifica las imágenes en el navegador!', 'ok');
  } catch(e) {
    if (e.name !== 'AbortError') log('Error: ' + e.message, 'err');
    document.getElementById('btn').disabled = false;
  }
}
</script>
</body>
</html>
